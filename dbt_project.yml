
name: 'my_first_dbt_project'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  +persist_docs:
      relation: true
      columns: true

  my_first_dbt_project:

    staging:
      google_analytics:
        +materialized: view
        +schema: stg_google_analytics
      sales_database:
        +schema: stg_sales_database
      google_sheets:
        +schema: stg_google_sheets

    intermediate:
      sales_database:
        +materialized: view
        +schema: int_sales_database
      google_analytics:
        +schema: int_google_analytics

    mart:
      +materialized: table
      +schema: mart
     

